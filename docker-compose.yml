version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: user-management-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: useradmin
      POSTGRES_PASSWORD: securepassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01-init-database.sql:/docker-entrypoint-initdb.d/01-init-database.sql
      - ./init/02-create-tables.sql:/docker-entrypoint-initdb.d/02-create-tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useradmin -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - user-management-network

  user-management-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-management-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: useradmin
      SPRING_DATASOURCE_PASSWORD: securepassword123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_SQL_INIT_MODE: never
      DB_HOST: postgres
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - user-management-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: user-management-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@userdemo.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - user-management-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  user-management-network:
    driver: bridge