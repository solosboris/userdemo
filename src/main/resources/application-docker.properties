# Docker-specific configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/userdb
spring.datasource.username=useradmin
spring.datasource.password=securepassword123

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=user_management

# Disable Spring Boot's built-in schema initialization
spring.sql.init.mode=never

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoints.web.discovery.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.ping.enabled=true
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.beans.enabled=true

# Logging
logging.level.com.example.userdemo=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# Server
server.port=8080
server.servlet.context-path=/