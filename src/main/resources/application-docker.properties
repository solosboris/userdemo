# Docker-specific configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/userdb
spring.datasource.username=useradmin
spring.datasource.password=securepassword123

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=user_management

# Disable Spring Boot's built-in schema initialization
spring.sql.init.mode=never

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Logging
logging.level.com.example.userdemo=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# Server
server.port=8080
server.servlet.context-path=/